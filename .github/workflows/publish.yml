name: Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.9.33)'
        required: true

permissions:
  contents: write

jobs:
  # ── 1. Validate version ────────────────────────────────────────────────────
  validate:
    name: Validate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      release_tag: ${{ steps.ver.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0

      - name: Read and validate tag
        id: ver
        run: |
          RELEASE_TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${RELEASE_TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "Tag: $RELEASE_TAG  Version: $VERSION"

  # ── 2. Build source package ────────────────────────────────────────────────
  build-package:
    name: Build Source Package
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.release_tag }}

      - name: Build source package
        id: package
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          SKIP_DB_DUMP=1 PACKAGE_OUTPUT_DIR="/tmp" STUDIO_VERSION="$VERSION" bash package.sh
          mv "/tmp/goku-studio-v${VERSION}.tar.gz" "$PWD/"
          echo "package=goku-studio-v${VERSION}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: studio-package
          path: goku-studio-v*.tar.gz
          retention-days: 1

  # ── 3. Create GitHub Release ───────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [validate, build-package]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.release_tag }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: studio-package

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.release_tag }}
          name: "Goku-Studio ${{ needs.validate.outputs.release_tag }}"
          draft: false
          prerelease: ${{ contains(needs.validate.outputs.version, '-') }}
          files: |
            goku-studio-v*.tar.gz
