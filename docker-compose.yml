version: "3.9"

# goku-studio standalone service
# Uses the same MySQL database as goku-core (shared-DB strategy, Phase B/C).
# Set DATABASE_URL to point at the same DB as goku-core.

services:
  studio:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8107}:8107"
    environment:
      PORT: "${PORT:-8107}"
      DATABASE_URL: "${DATABASE_URL}"
      SECRET_KEY: "${SECRET_KEY}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:5106}"
      AGENT_WORKSPACE: /workspace
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-}"
      # goku-core runtime API — MCP test/sync/refresh are proxied there.
      # Inside a container "localhost" is the studio container itself, so this
      # MUST point at wherever core actually runs, e.g.
      #   core on the same host        → http://host.docker.internal:8106
      #   core on another host / k8s   → http://<core-host-or-service>:8106
      CORE_API_URL: "${CORE_API_URL:-http://host.docker.internal:8106}"
      # LLM (Studio uses LLM only for agent-config previews)
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
    volumes:
      - workspace_data:/workspace
    # Make host.docker.internal resolve on Linux Docker (no-op on Mac/Win).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8107/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  workspace_data:
